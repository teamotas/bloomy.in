<div class="about-form-box bg-theme">
    <h3 class="form-title">Feel Free To Ask Us Anything</h3>

    <form id="contactForm" action="form.php" method="post" novalidate>

        <!-- Name -->
        <input type="text"
            class="w-100 form-control py-3 mb-1 border-primary"
            placeholder="Your Name"
            name="txtname"
            id="name"
            required>
        <small class="text-danger d-block mb-2" id="nameError"></small>

        <!-- Mobile -->
        <input type="tel"
            class="w-100 form-control py-3 mb-1 border-primary"
            placeholder="Enter Your Mobile Number"
            name="txtmobile"
            id="mobile"
            maxlength="10"
            required>
        <small class="text-danger d-block mb-2" id="mobileError"></small>

        <!-- Email -->
        <input type="email"
            class="w-100 form-control py-3 mb-1 border-primary"
            placeholder="Enter Your Email"
            name="txtemail"
            id="email"
            required>
        <small class="text-danger d-block mb-2" id="emailError"></small>

        <!-- Message -->
        <textarea
            class="w-100 form-control mb-1 border-primary"
            rows="5"
            name="comments"
            id="message"
            placeholder="Your Message"></textarea>
        <small class="text-danger d-block mb-2" id="messageError"></small>

        <input type="hidden" id="g-recaptcha-response" name="g-recaptcha-response">

        <button type="submit" class="vs-btn wave-btn btn-white">Submit</button>

    </form>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {

    let isValid = true;

    // Inputs
    const name = document.getElementById("name");
    const mobile = document.getElementById("mobile");
    const email = document.getElementById("email");
    const message = document.getElementById("message");

    // Errors
    const nameError = document.getElementById("nameError");
    const mobileError = document.getElementById("mobileError");
    const emailError = document.getElementById("emailError");
    const messageError = document.getElementById("messageError");

    // Reset
    nameError.textContent = "";
    mobileError.textContent = "";
    emailError.textContent = "";
    messageError.textContent = "";

    // Name
    if (name.value.trim().length < 3) {
        nameError.textContent = "Name must be at least 3 characters";
        isValid = false;
    }

    // Mobile (10 digit)
    const mobilePattern = /^[0-9]{10}$/;
    if (!mobilePattern.test(mobile.value)) {
        mobileError.textContent = "Enter valid 10-digit mobile number";
        isValid = false;
    }

    // Email
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!emailPattern.test(email.value)) {
        emailError.textContent = "Enter valid email address";
        isValid = false;
    }

    // Message
    if (message.value.trim().length < 5) {
        messageError.textContent = "Message must be at least 5 characters";
        isValid = false;
    }

    if (!isValid) {
        e.preventDefault();
    }
});
</script>

<button onclick="openForm()" class="vs-btn">Open Form</button>
<div id="popupForm" class="form-popup">
    <div class="form-container">

        <span class="close-btn" onclick="closeForm()">×</span>

        <h3>Quick Enquiry</h3>

        <!-- SAME FORM -->
        <form id="popupContactForm" action="form.php" method="post" novalidate>

            <input type="text" placeholder="Your Name" name="txtname" id="p_name" required>
            <small class="text-danger" id="p_nameError"></small>

            <input type="tel" placeholder="Mobile Number" name="txtmobile" id="p_mobile" maxlength="10" required>
            <small class="text-danger" id="p_mobileError"></small>

            <input type="email" placeholder="Email" name="txtemail" id="p_email" required>
            <small class="text-danger" id="p_emailError"></small>

            <textarea placeholder="Message" name="comments" id="p_message"></textarea>
            <small class="text-danger" id="p_messageError"></small>

            <button type="submit" class="vs-btn">Submit</button>
        </form>

    </div>
</div>
<style>
.form-popup {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
}

.form-container {
    background: #fff;
    max-width: 400px;
    margin: 8% auto;
    padding: 20px;
    border-radius: 10px;
    position: relative;
}

.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    cursor: pointer;
    font-size: 22px;
}
</style>

<script>
function openForm() {
    document.getElementById("popupForm").style.display = "block";
}

function closeForm() {
    document.getElementById("popupForm").style.display = "none";
}
</script>
